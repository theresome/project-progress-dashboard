name: Build Windows app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'v1.0.0' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build Windows packages
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        shell: pwsh
        run: |
          if ($env:WIN_CSC_LINK -and $env:WIN_CSC_KEY_PASSWORD) {
            npm run build:win
          } else {
            Write-Host "No signing certificate configured. Building unsigned packages."
            npm run build:win:unsigned
          }

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: release/*.exe
          if-no-files-found: error

      - name: Remove existing release files
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $assets = @(
            "项目进展台-Windows-Setup.exe",
            "项目进展台-Windows-Portable.exe"
          )
          foreach ($asset in $assets) {
            gh release delete-asset "$env:RELEASE_TAG" $asset --yes 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Host "No existing asset to replace: $asset"
            }
          }
          exit 0

      - name: Publish release files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release/*.exe
          generate_release_notes: true
